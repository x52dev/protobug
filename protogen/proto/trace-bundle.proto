syntax = "proto3";

import "google/protobuf/timestamp.proto";

message TraceBundle {
    string export_id = 1;
    google.protobuf.Timestamp captured_at = 2;
    Environment environment = 3;
    repeated Service services = 4;
    map<string, string> labels = 5;
    optional UserContext user = 6;
    repeated Alert alerts = 7;

    oneof transport {
        HttpRequest http = 20;
        QueueMessage queue = 21;
    };

    bytes raw_envelope = 22;

    enum Environment {
        Production = 0;
        Staging = 1;
        Development = 2;
    }

    enum SpanStatus {
        Ok = 0;
        Error = 1;
        Timeout = 2;
        Cancelled = 3;
    }

    enum Severity {
        Info = 0;
        Warning = 1;
        Critical = 2;
    }

    message Service {
        string name = 1;
        string version = 2;
        repeated Span spans = 3;
        map<string, string> annotations = 4;
    }

    message Span {
        string span_id = 1;
        optional string parent_span_id = 2;
        google.protobuf.Timestamp started_at = 3;
        uint32 duration_ms = 4;
        SpanStatus status = 5;
        repeated Attribute attributes = 6;
        repeated Event events = 7;
    }

    message Attribute {
        string key = 1;

        oneof value {
            string string_value = 2;
            int64 int_value = 3;
            bool bool_value = 4;
            bytes bytes_value = 5;
        };
    }

    message Event {
        string name = 1;
        google.protobuf.Timestamp at = 2;
        repeated Attribute fields = 3;
    }

    message Alert {
        Severity severity = 1;
        string code = 2;
        repeated string related_span_ids = 3;
        optional string summary = 4;
    }

    message UserContext {
        string user_id = 1;
        repeated string roles = 2;
        map<string, string> traits = 3;
    }

    message HttpRequest {
        string method = 1;
        string path = 2;
        repeated Header headers = 3;
        bytes body = 4;
    }

    message QueueMessage {
        string topic = 1;
        uint32 partition = 2;
        uint64 offset = 3;
        repeated Header headers = 4;
    }

    message Header {
        string name = 1;
        string value = 2;
    }
}

message TraceReplayRequest {
    string request_id = 1;
    TraceBundle.Environment target_environment = 2;
    repeated string focus_span_ids = 3;
    map<string, string> field_overrides = 4;
    repeated TraceBundle.Alert expected_alerts = 5;
    repeated TraceBundle.Header metadata = 6;

    oneof source {
        TraceBundle trace_bundle = 10;
        TraceBundle.HttpRequest http = 11;
        TraceBundle.QueueMessage queue = 12;
    };

    bytes checksum = 13;
}
